name: Feature request
description: Propose an improvement for NEXO
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or pain point should be improved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the feature or behavior you want.
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Why this matters
      description: Explain the developer, team, or documentation value.
